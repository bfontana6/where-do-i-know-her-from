<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Hot cinematic gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="40%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>

    <!-- Glowing white-to-pink for the question mark -->
    <linearGradient id="qmark" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>

    <!-- Spotlight cone from top -->
    <radialGradient id="spot" cx="0.5" cy="0.15" r="0.7" fx="0.5" fy="0.1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft glow behind the question mark -->
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="28" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Outer glow for the silhouette -->
    <filter id="silhouette-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Film grain texture overlay -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feBlend in="SourceGraphic" in2="mono" mode="overlay" result="blend"/>
      <feComponentTransfer in="blend">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1024" height="1024" rx="0" fill="url(#bg)"/>

  <!-- Spotlight wash -->
  <rect width="1024" height="1024" fill="url(#spot)"/>

  <!-- Diagonal film-strip accent lines (top-left) -->
  <line x1="0" y1="220" x2="220" y2="0" stroke="#ffffff" stroke-width="2.5" opacity="0.12"/>
  <line x1="0" y1="300" x2="300" y2="0" stroke="#ffffff" stroke-width="1.5" opacity="0.08"/>
  <line x1="0" y1="380" x2="380" y2="0" stroke="#ffffff" stroke-width="1" opacity="0.05"/>

  <!-- Diagonal film-strip accent lines (bottom-right) -->
  <line x1="804" y1="1024" x2="1024" y2="804" stroke="#ffffff" stroke-width="2.5" opacity="0.12"/>
  <line x1="724" y1="1024" x2="1024" y2="724" stroke="#ffffff" stroke-width="1.5" opacity="0.08"/>
  <line x1="644" y1="1024" x2="1024" y2="644" stroke="#ffffff" stroke-width="1" opacity="0.05"/>

  <!-- Person silhouette — slightly transparent, behind the ? -->
  <g opacity="0.18" filter="url(#silhouette-glow)">
    <!-- Head -->
    <circle cx="512" cy="320" r="145" fill="#ffffff"/>
    <!-- Shoulders -->
    <ellipse cx="512" cy="590" rx="220" ry="150" fill="#ffffff"/>
  </g>

  <!-- Giant question mark — the hero element -->
  <text x="524" y="740"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="700"
        font-weight="bold"
        fill="url(#qmark)"
        text-anchor="middle"
        filter="url(#glow)"
        opacity="0.95">?</text>

  <!-- Small sparkle accents -->
  <!-- Top-right sparkle -->
  <g transform="translate(780, 200)" opacity="0.7">
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="-10" x2="-10" y2="10" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Bottom-left sparkle -->
  <g transform="translate(220, 820)" opacity="0.5">
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="7" y1="-7" x2="-7" y2="7" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Mid-left tiny sparkle -->
  <g transform="translate(160, 480)" opacity="0.35">
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
