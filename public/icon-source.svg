<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="face" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="0.5" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
    <filter id="textshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#a5b4fc" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle spotlight -->
  <rect width="1024" height="1024" rx="224" fill="url(#spotlight)"/>

  <!-- Film frame border notches (left side) -->
  <rect x="80" y="160" width="40" height="56" rx="6" fill="#4338ca" opacity="0.5"/>
  <rect x="80" y="256" width="40" height="56" rx="6" fill="#4338ca" opacity="0.5"/>
  <rect x="80" y="352" width="40" height="56" rx="6" fill="#4338ca" opacity="0.5"/>
  <rect x="80" y="448" width="40" height="56" rx="6" fill="#4338ca" opacity="0.5"/>
  <rect x="80" y="544" width="40" height="56" rx="6" fill="#4338ca" opacity="0.5"/>
  <rect x="80" y="640" width="40" height="56" rx="6" fill="#4338ca" opacity="0.5"/>
  <rect x="80" y="736" width="40" height="56" rx="6" fill="#4338ca" opacity="0.5"/>
  <rect x="80" y="832" width="40" height="56" rx="6" fill="#4338ca" opacity="0.5"/>

  <!-- Film frame border notches (right side) -->
  <rect x="904" y="160" width="40" height="56" rx="6" fill="#4338ca" opacity="0.5"/>
  <rect x="904" y="256" width="40" height="56" rx="6" fill="#4338ca" opacity="0.5"/>
  <rect x="904" y="352" width="40" height="56" rx="6" fill="#4338ca" opacity="0.5"/>
  <rect x="904" y="448" width="40" height="56" rx="6" fill="#4338ca" opacity="0.5"/>
  <rect x="904" y="544" width="40" height="56" rx="6" fill="#4338ca" opacity="0.5"/>
  <rect x="904" y="640" width="40" height="56" rx="6" fill="#4338ca" opacity="0.5"/>
  <rect x="904" y="736" width="40" height="56" rx="6" fill="#4338ca" opacity="0.5"/>
  <rect x="904" y="832" width="40" height="56" rx="6" fill="#4338ca" opacity="0.5"/>

  <!-- Person silhouette (head) -->
  <circle cx="512" cy="340" r="130" fill="url(#face)" filter="url(#shadow)"/>

  <!-- Person silhouette (shoulders) -->
  <ellipse cx="512" cy="600" rx="200" ry="130" fill="url(#face)" filter="url(#shadow)"/>

  <!-- Clip the bottom of the shoulders to look natural -->
  <rect x="280" y="640" width="464" height="120" fill="url(#bg)"/>
  <rect x="280" y="640" width="464" height="120" fill="url(#spotlight)"/>

  <!-- Question mark overlay -->
  <text x="512" y="620" font-family="Georgia, serif" font-size="420" font-weight="bold"
        fill="url(#glow)" text-anchor="middle" filter="url(#textshadow)" opacity="0.9">?</text>

  <!-- Bottom label bar -->
  <rect x="160" y="780" width="704" height="100" rx="20" fill="#4338ca" opacity="0.25"/>
  <text x="512" y="848" font-family="Inter, -apple-system, Helvetica, Arial, sans-serif" font-size="48" font-weight="700"
        fill="#c7d2fe" text-anchor="middle" letter-spacing="3">WHO'S THAT?</text>
</svg>
